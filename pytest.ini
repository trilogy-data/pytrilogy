[pytest]
markers =
    adventureworks_execution: marks test as requiring adventureworks db and running queries
    adventureworks: marks tests as requirin adventureworks
    clickhouse_server: marks tests as requiring a real ClickHouse server (env vars TRILOGY_CLICKHOUSE_*)
    v4_parity: v3-vs-v4 discovery planner result-parity cases (local_scripts/v4_evals)