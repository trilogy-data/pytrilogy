# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          - python-version: "3.13"
            run_llm_tests: true
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606  # v1.15.4
        with:
          toolchain: stable
      - name: Install uv for script tests
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093'  # v3
        with:
          workload_identity_provider: 'projects/734709568634/locations/global/workloadIdentityPools/github/providers/preql-integration'
          project_id: 'preqldata'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel maturin
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install sqlalchemy-bigquery --ignore-requires-python
      - name: Run Rust tests
        run: |
          cd trilogy/scripts/dependency
          cargo test --release
      - name: Build Rust extension
        run: |
          pip install -e .
      - name: Lint with mypy
        run: |
          # stop the build if there are Python syntax errors or undefined names
          mypy trilogy
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check trilogy
      - name: Test with pytest
        if: matrix.run_llm_tests == true
        run: |
          pip install pytest
          pip install pytest-cov
          pytest tests/ --cov=./ -m "not adventureworks_execution"
        env:
          GOOGLE_HMAC_SECRET: ${{ secrets.GOOGLE_HMAC_SECRET }}
          GOOGLE_HMAC_KEY: ${{ secrets.GOOGLE_HMAC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Test with pytest (skip LLM provider tests)
        if: matrix.run_llm_tests != true
        run: |
          pip install pytest
          pip install pytest-cov
          pytest tests/ --cov=./ -m "not adventureworks_execution" --ignore=tests/ai/test_providers_basic.py
        env:
          GOOGLE_HMAC_SECRET: ${{ secrets.GOOGLE_HMAC_SECRET }}
          GOOGLE_HMAC_KEY: ${{ secrets.GOOGLE_HMAC_KEY }}
      - name: Test after installing rich
        run: |
          # install rich and rerun CLI tests
          pip install rich
          pytest tests/ --cov=./ --cov-append -m "not adventureworks_execution" -k "test_trilogy"
          pytest tests/ --cov=./ --cov-append -m "not adventureworks_execution" -k "test_display"
          pytest tests/ --cov=./ --cov-append -m "not adventureworks_execution" -k "test_refresh"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          name: ${{ matrix.os }}-py${{ matrix.python-version }}
      - name: Test package cli (Linux)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install .
          .venv/bin/trilogy --help
          .venv/bin/trilogy run "SELECT 1 + 1->test;" duckdb
      - name: Test package cli (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv/Scripts/python -m pip install --upgrade pip
          .venv/Scripts/python -m pip install .
          .venv/Scripts/trilogy --help
          .venv/Scripts/trilogy run "SELECT 1 + 1->test;" duckdb
